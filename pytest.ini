[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore::RuntimeWarning
# Integration tests below target modules that are not in this repo (see report / roadmap).
addopts =
    --ignore=tests/integration/test_pipeline.py
    --ignore=tests/integration/test_risk_metrics.py
    --ignore=tests/integration/test_transaction_costs.py
    --ignore=tests/integration/test_factor_models.py
